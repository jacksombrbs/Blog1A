<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Jacks</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <header>
        <h1>Meu Blog Tech</h1>
        <p>Vou compartilhar informações sobre tecnologia e programção, haja vista, que somos muito bons nisso!</p>
    </header>
    <main>
        <img src="" alt="">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: jacksom Barbosa</p>
            <p>Sejam bem vindos ao meu blog! Vai ser uma viagem muito louca.</p>
        </div>
        <button>Curtir<span>0</span></button>
    </main>
</body>
<script>
    const botao = document.querySelector("button");
    botao.addEventListener("click",botaoClicado);

    function botaoClicado(){
        let texto = botao.querySelector("span")
        texto.textContent++;
    }
</script>

</html>
